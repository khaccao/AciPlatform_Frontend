name: Build and Deploy Frontend

on:
  push:
    branches:
      - testing
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/testing' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/root/apps/AciPlatform"
            FRONTEND_DIR="/root/apps/AciPlatform_Frontend"
            
            # 1. Update/Clone Backend Code (to get latest compose file)
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
                echo "Backend directory not found, cloning..."
                mkdir -p $DEPLOY_DIR
                cd $DEPLOY_DIR
                git clone -b staging https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/khaccao/AciPlatform.git .
            else
                cd $DEPLOY_DIR
                echo "Updating Backend..."
                git fetch origin staging
                git reset --hard origin/staging
            fi
            
            # 2. Update/Clone Frontend Code
            if [ ! -d "$FRONTEND_DIR/.git" ]; then
                echo "Frontend directory not found or not a git repo, cloning branch 'testing'..."
                rm -rf $FRONTEND_DIR
                mkdir -p $FRONTEND_DIR
                cd $FRONTEND_DIR
                git clone -b testing https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/khaccao/AciPlatform_Frontend.git .
            else
                cd $FRONTEND_DIR
                echo "Current Frontend Remote Info:"
                git remote -v
                echo "Updating Frontend from branch 'testing'..."
                if ! git fetch origin testing; then
                    echo "Fetch failed, re-cloning frontend..."
                    cd ..
                    rm -rf $FRONTEND_DIR
                    mkdir -p $FRONTEND_DIR
                    cd $FRONTEND_DIR
                    git clone -b testing https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/khaccao/AciPlatform_Frontend.git .
                else
                    git reset --hard origin/testing
                fi
            fi
            
            # 3. Docker Sync & Restart
            # We always run compose from the Backend directory
            cd $DEPLOY_DIR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull
            docker compose down
            docker compose up -d --build
            
            # 4. Show Status
            sleep 5
            docker ps
